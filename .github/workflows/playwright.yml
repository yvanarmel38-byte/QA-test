name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:    # enables "Run workflow" button in the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Playwright Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      # Run all browser jobs even if one fails
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      # ── 1. Checkout source code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ───────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install npm dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Install Playwright browsers ─────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      # ── 5. Write .env from GitHub secret (or use defaults) ─────────────────
      - name: Create .env file
        run: echo "BASE_URL=${{ secrets.BASE_URL || 'https://qa-assessment.pages.dev' }}" > .env

      # ── 6. Run tests for the current browser ───────────────────────────────
      - name: Run Playwright tests — ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: 'true'

      # ── 7. Upload HTML report artifact ─────────────────────────────────────
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      # ── 8. Upload Allure results ────────────────────────────────────────────
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 14

      # ── 9. Upload test artifacts (screenshots, videos, traces) ──────────────
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ matrix.browser }}
          path: test-results/
          retention-days: 7

